<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Sentia Relic Archive</title>

<!-- MAIN SITE STYLE (cursor + runes) -->
<link rel="stylesheet" href="/styles.css">

<!-- SHOP LAYOUT -->
<link rel="stylesheet" href="/shop.css">

</head>

<body>

<a class="back-btn" href="/index.html">← BACK</a>

<!-- rune layer used by cursor system -->
<div id="rune-layer"></div>

<button id="saveLayout" class="save-layout">Save Layout</button>

<div class="ui-canvas">

<!-- CHARACTER PANEL -->

<div class="ui-box character-panel" data-id="character-panel">

<button class="lock-btn">🔒</button>
<div class="resize-handle"></div>

<div class="character-name" id="relicName"></div>
<div class="character-stats" id="relicStats"></div>
<div class="character-description" id="relicDesc"></div>

<button class="character-buy" id="relicBuy"></button>

</div>


<!-- SHOP FRAME -->

<div class="ui-box shop-frame" data-id="shop-frame">

<button class="lock-btn">🔒</button>
<div class="resize-handle"></div>

<img class="shopborder1" src="/assets/shop-border/shop-border1.png">

<div class="product-zone ui-box" data-id="product-zone">

<button class="lock-btn">🔒</button>
<div class="resize-handle"></div>

<img id="relicImage" class="relic-product">

</div>

</div>


<!-- QUESTERS DROPDOWN -->

<div class="ui-box quester-panel" data-id="quester-panel">

<button class="lock-btn">🔒</button>
<div class="resize-handle"></div>

<div class="quester-title" id="questerToggle">
Questers ▾
</div>

<div id="questerList" style="display:none"></div>

</div>

</div>


<!-- NPC -->

<div class="npc-dialogue ui-box" data-id="npc-dialogue">

<button class="lock-btn">🔒</button>
<div class="resize-handle"></div>

<div class="dialogue-bubble" id="npcText"></div>

</div>


<!-- MOBILE SHOP -->

<div class="mobile-shop">

<button id="prevRelic" class="arrow arrow-left">◀</button>

<div class="mobile-frame">
<img id="mobileRelic" class="mobile-relic">
</div>

<button id="nextRelic" class="arrow arrow-right">▶</button>

</div>


<!-- CURSOR SYSTEM -->
<script src="/script.js"></script>

<!-- SHOP LOGIC -->
<script src="/shop.js"></script>

</body>
</html>
<script src="/script.js"></script>
